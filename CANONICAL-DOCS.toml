# Canonical-docs declaration — the publishable doc surface the content leaf
# ingests for the keystone domain ([internal] CANONICAL-DOCS-FORMAT.md).
# Only docs at NON-scrubbed paths are listed: the release builder drops
# **/HANDOFF*, *REVIEW*, *EXPLORATION*, PROPOSAL-*, RESPONSE-*, STATUS*,
# WORKSTREAMS.md, .claude/, CLAUDE.md — so the canonical surface (conformance
# matrix + research diagnostics) lives under names that survive the cut. The
# internal STATUS.md / WORKSTREAMS.md are intentionally NOT declared (ephemeral
# steward planning, honest absence per ADR-0012); the project's workstream shape
# is conveyed by the README's three-arms section.

[project]
name   = "Entity Core Keystone"
slug   = "entity-core-keystone"
repo   = "entity-core-keystone"
github = "https://github.com/EntityChurch/entity-core-keystone"
intro  = """
The keystone of the Entity Core arch: a generator that emits a full core
protocol peer (entity-core-protocol-<lang>) for any target language from the V7
spec, plus a language-agnostic codec C-ABI. The cohort is 21 generated core
peers, each passing the validate-peer --profile core conformance gate with 0
FAIL on one current oracle — see the conformance matrix for the per-peer
transparency contract (spec version, oracle commit, codec/crypto strategy,
known gaps). Honest scope: these peers are generated, so they share a generation
lineage — the strong claim is spec-forced convergence across 21 different
languages/runtimes, not 21 independently-authored code bases (ADR-0012). This is
a 0.8 pre-release surface: solid and oracle-pinned on the tested core profile,
still evolving as new languages and spec amendments run through the generator.
"""

